version: "3.9"

services:
  ai-worker-api:
    build:
      context: ./services/ai-internet-worker
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    env_file:
      - services/ai-internet-worker/.env.example
    ports:
      - "8080:8080"
    depends_on:
      - ai-worker-postgres
      - ai-worker-redis
    volumes:
      - ./services/ai-internet-worker:/app

  ai-worker-celery:
    build:
      context: ./services/ai-internet-worker
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app.celery_app worker -l info
    env_file:
      - services/ai-internet-worker/.env.example
    depends_on:
      - ai-worker-postgres
      - ai-worker-redis
    volumes:
      - ./services/ai-internet-worker:/app

  ai-worker-beat:
    build:
      context: ./services/ai-internet-worker
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app.celery_app beat -l info
    env_file:
      - services/ai-internet-worker/.env.example
    depends_on:
      - ai-worker-postgres
      - ai-worker-redis
    volumes:
      - ./services/ai-internet-worker:/app

  ai-worker-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_internet_worker
      POSTGRES_USER: worker
      POSTGRES_PASSWORD: worker
    ports:
      - "5434:5432"
    volumes:
      - ai-worker-postgres-data:/var/lib/postgresql/data

  ai-worker-redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

volumes:
  ai-worker-postgres-data:
