version: "3.9"
services:
  isolated-code-runner:
    build:
      context: ./services/isolated-code-runner
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      RUNNER_API_KEY: ${RUNNER_API_KEY:-change-me}
      RUNNER_DEFAULT_TIMEOUT_MS: 1500
      RUNNER_MAX_TIMEOUT_MS: 5000
      RUNNER_MAX_CONCURRENT_JOBS: 4
      RUNNER_MAX_REQUESTS_PER_MINUTE: 240
      RUNNER_AUDIT_LOG_ENABLED: "true"
      RUNNER_AUDIT_LOG_FILE: /var/log/runner/audit.log
      RUNNER_SANDBOX_UID: 10001
      RUNNER_SANDBOX_GID: 10001
      RUNNER_DISABLE_NETWORK: "false" # set true to try per-job netns isolation via unshare -n
      RUNNER_DISABLE_NETWORK_STRICT: "false"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,exec,nosuid,nodev
      - /var/log/runner:size=16m,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - KILL
    pids_limit: 128
    mem_limit: 256m
    cpus: 1.0
