name: Phase 7 Canary

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

jobs:
  daily-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run canary
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXTJS_URL: ${{ secrets.NEXTJS_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          CLAWCLOUD_AUDIT_USER_ID: ${{ secrets.CLAWCLOUD_AUDIT_USER_ID }}
          WHATSAPP_AUTO_TEST_USER_ID: ${{ secrets.WHATSAPP_AUTO_TEST_USER_ID }}
        run: |
          if [ -n "${NEXT_PUBLIC_APP_URL}${NEXTJS_URL}" ] && { [ -n "${CRON_SECRET}" ] || [ -n "${AGENT_SECRET}" ]; }; then
            npm run qa:canary
          else
            npm run qa:canary -- --dry-run
          fi
